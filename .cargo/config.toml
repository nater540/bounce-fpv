[build]
target = "thumbv7em-none-eabihf"
# cortex-m-rt supplies link.x; each crate's build.rs puts the workspace memory.x on the linker search
# path so link.x can INCLUDE it. No -Tlinkall.x (that was esp-hal); no build-std (prebuilt target).
# -Tdefmt.x is global: every nRF binary links applog, which provides defmt-rtt's #[global_logger] and pulls
# defmt in (lora-phy needs it unconditionally), so the .defmt section is always present — placing the script
# here removes the per-binary build.rs defmt handling. Harmless for an image that ends up with no defmt data.
rustflags = ["-C", "link-arg=-Tlink.x", "-C", "link-arg=-Tdefmt.x"]

# Nice!Nano v2 (nRF52840) ships the Adafruit UF2 bootloader: double-tap RESET to mount the mass-storage
# volume, then copy a .uf2. There is no probe, so flashing is a file copy. `cargo run` is left without a
# runner because the UF2 step (objcopy -> uf2 -> copy to the mounted volume) lives in the justfile; see
# `just flash` / `just flash-monitor` for the exact commands. cargo-hf2 or a wrapper could replace this later.

# All workspace binaries (nrf-spike, ppm-diag, lora-ping, truck-diag, goggle-node, truck-node) build for
# thumbv7em-none-eabihf — the ESP32-C6 migration is code-complete and no crate references esp-hal/esp-rtos
# any more. Note: there is no [unstable] build-std here — thumbv7em-none-eabihf is prebuilt (the esp era,
# on a riscv core target, needed core rebuilt from source).
